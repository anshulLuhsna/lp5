<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LP5 Notebook Mission Map</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b10;
      --panel: #11151d;
      --panel-2: #171d28;
      --line: #293241;
      --text: #eff4ff;
      --muted: #9da9ba;
      --soft: #c9d3e3;
      --danger: #f87171;
      --good: #58d68d;
      --warn: #f5c451;
      --blue: #6fb6ff;
      --pink: #ff7ab6;
      --green: #76df9f;
      --amber: #f9b65c;
      --violet: #b69cff;
      --shadow: 0 20px 70px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      background:
        radial-gradient(circle at 12% 8%, rgba(111, 182, 255, 0.16), transparent 26rem),
        radial-gradient(circle at 82% 16%, rgba(255, 122, 182, 0.13), transparent 25rem),
        linear-gradient(180deg, #0a0d13 0%, #090b10 48%, #0d1118 100%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 22px;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 4.4rem);
      line-height: 0.96;
      max-width: 780px;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 760px;
      margin: 14px 0 0;
      color: var(--soft);
      font-size: 1rem;
      line-height: 1.6;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 86px);
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(17, 21, 29, 0.88);
      box-shadow: var(--shadow);
    }

    .stat {
      min-height: 62px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      background: var(--panel-2);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      font-weight: 700;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      font-size: 1.32rem;
      line-height: 1;
    }

    .tabs {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin: 0 0 18px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(9, 11, 16, 0.9);
      backdrop-filter: blur(14px);
    }

    .tab {
      min-height: 42px;
      color: var(--soft);
      border-radius: 6px;
      background: transparent;
      font-weight: 800;
    }

    .tab[aria-selected="true"] {
      color: #061016;
      background: var(--text);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(17, 21, 29, 0.84);
      box-shadow: var(--shadow);
      overflow: clip;
    }

    .panel-head {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    .panel-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .panel-body {
      padding: 16px;
    }

    .mission-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .mission-card {
      position: relative;
      min-height: 212px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.015));
      text-align: left;
      overflow: hidden;
    }

    .mission-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--mission), transparent 56%);
      opacity: 0.18;
      pointer-events: none;
    }

    .mission-card > * {
      position: relative;
    }

    .mission-card.active {
      border-color: var(--mission);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--mission) 55%, transparent);
    }

    .mission-icon {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      margin-bottom: 12px;
      border: 1px solid color-mix(in srgb, var(--mission) 72%, #ffffff 12%);
      border-radius: 8px;
      color: #071018;
      background: var(--mission);
      font-size: 1.12rem;
      font-weight: 900;
    }

    .mission-card h3 {
      margin: 0 0 7px;
      font-size: 1.05rem;
    }

    .mission-card p {
      margin: 0;
      color: var(--soft);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .mission-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      color: var(--soft);
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.76rem;
      font-weight: 800;
    }

    .progress-line {
      width: 100%;
      height: 8px;
      margin-top: 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .progress-line span {
      display: block;
      height: 100%;
      width: var(--progress);
      border-radius: inherit;
      background: var(--mission);
      transition: width 0.2s ease;
    }

    .mission-detail {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
      gap: 14px;
      margin-top: 14px;
    }

    .timeline {
      display: grid;
      gap: 8px;
    }

    .step {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 58px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.025);
    }

    .step.locked {
      opacity: 0.48;
    }

    .step.current {
      border-color: var(--mission);
      background: color-mix(in srgb, var(--mission) 10%, rgba(255, 255, 255, 0.025));
    }

    .step-number {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: 8px;
      color: #051018;
      background: var(--mission);
      font-weight: 900;
    }

    .step h4 {
      margin: 0;
      font-size: 0.92rem;
    }

    .step p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.35;
    }

    .status-dot {
      display: grid;
      width: 28px;
      height: 28px;
      place-items: center;
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.06);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .status-dot.done {
      color: #06130c;
      background: var(--good);
    }

    .challenge {
      display: grid;
      gap: 14px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .prompt {
      margin: 0;
      font-size: 1.22rem;
      line-height: 1.35;
      font-weight: 850;
    }

    .prompt small {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .answer,
    .control,
    .mini-button {
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      text-align: left;
      font-weight: 800;
    }

    .answer:hover,
    .control:hover,
    .mini-button:hover,
    .order-card:hover {
      border-color: var(--soft);
      background: rgba(255, 255, 255, 0.075);
    }

    .answer.correct,
    .choice.correct {
      border-color: var(--good);
      background: rgba(88, 214, 141, 0.16);
    }

    .answer.wrong,
    .choice.wrong {
      border-color: var(--danger);
      background: rgba(248, 113, 113, 0.14);
    }

    .feedback {
      min-height: 58px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--soft);
      background: rgba(0, 0, 0, 0.16);
      line-height: 1.45;
    }

    .feedback.good {
      border-color: rgba(88, 214, 141, 0.46);
    }

    .feedback.bad {
      border-color: rgba(248, 113, 113, 0.46);
    }

    .mode-grid {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 14px;
    }

    .side {
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .select-list {
      display: grid;
      gap: 8px;
    }

    .select-button {
      min-height: 48px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--soft);
      background: rgba(255, 255, 255, 0.035);
      text-align: left;
      font-weight: 850;
    }

    .select-button.active {
      color: #071018;
      border-color: var(--mission);
      background: var(--mission);
    }

    .sequence-board {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
    }

    .stack {
      min-height: 240px;
      padding: 10px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.12);
    }

    .stack h3 {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
    }

    .order-card {
      display: block;
      width: 100%;
      min-height: 48px;
      margin-bottom: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.045);
      text-align: left;
      font-weight: 800;
    }

    .order-card small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-weight: 650;
      line-height: 1.35;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .control {
      text-align: center;
      min-width: 116px;
    }

    .control.primary {
      color: #061018;
      border-color: var(--text);
      background: var(--text);
    }

    .control.danger {
      color: #1a0707;
      border-color: var(--danger);
      background: var(--danger);
    }

    .duel-card {
      display: grid;
      gap: 12px;
      min-height: 330px;
    }

    .notebook-choices {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .choice {
      min-height: 112px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      text-align: left;
    }

    .choice strong,
    .choice span {
      display: block;
    }

    .choice strong {
      margin-bottom: 6px;
      font-size: 0.96rem;
    }

    .choice span {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.35;
    }

    .weak-list {
      display: grid;
      gap: 8px;
    }

    .weak-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.035);
    }

    .weak-item h3 {
      margin: 0;
      font-size: 0.92rem;
    }

    .weak-item p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.4;
    }

    .count {
      display: grid;
      min-width: 42px;
      height: 34px;
      place-items: center;
      border-radius: 8px;
      color: #1c1000;
      background: var(--warn);
      font-weight: 900;
    }

    .empty {
      min-height: 180px;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.025);
      text-align: center;
    }

    .kbd {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 1px 6px;
      border: 1px solid var(--line);
      border-radius: 5px;
      color: var(--soft);
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.78rem;
      font-weight: 800;
    }

    @media (max-width: 980px) {
      .topbar,
      .mission-detail,
      .mode-grid,
      .sequence-board {
        grid-template-columns: 1fr;
      }

      .stats,
      .mission-grid,
      .notebook-choices {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 18px;
      }

      .tabs,
      .answers,
      .stats,
      .mission-grid,
      .notebook-choices {
        grid-template-columns: 1fr;
      }

      .topbar {
        gap: 12px;
      }

      .panel-head {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">LP5 Deep Learning Assignments</p>
        <h1>Notebook Mission Map</h1>
        <p class="subtitle">Four missions. Four pipelines. Master the order, spot the differences, and keep weak facts coming back until they stick.</p>
      </div>
      <section class="stats" aria-label="Progress stats">
        <div class="stat"><span>Score</span><strong id="scoreStat">0</strong></div>
        <div class="stat"><span>Streak</span><strong id="streakStat">0</strong></div>
        <div class="stat"><span>Missions</span><strong id="missionStat">0/4</strong></div>
        <div class="stat"><span>Weak</span><strong id="weakStat">0</strong></div>
      </section>
    </header>

    <nav class="tabs" aria-label="Game modes">
      <button class="tab" data-mode="map" aria-selected="true">Mission Map</button>
      <button class="tab" data-mode="sequence" aria-selected="false">Sequence</button>
      <button class="tab" data-mode="duel" aria-selected="false">Difference Duel</button>
      <button class="tab" data-mode="params" aria-selected="false">Model Params</button>
      <button class="tab" data-mode="weak" aria-selected="false">Weak Review</button>
    </nav>

    <section id="modeRoot" class="layout" aria-live="polite"></section>
  </main>

  <script>
    const STORAGE_KEY = "lp5-notebook-mission-map-v1";

    const missions = [
      {
        id: "boston",
        notebook: "1_Boston.ipynb",
        title: "Boston Housing",
        icon: "B",
        color: "#6fb6ff",
        role: "Tabular regression",
        dataset: "HousingData.csv",
        model: "Dense(64) -> Dense(32) -> Dense(1)",
        output: "Numeric house price",
        memoryHook: "CSV table, MEDV target, StandardScaler, regression metrics.",
        steps: [
          {
            title: "Load Dataset",
            detail: "Read HousingData.csv. MEDV is the price target.",
            check: "What is the target column in the Boston notebook?",
            correct: "MEDV",
            distractors: ["Open", "sentiment", "class_name"],
            explain: "Boston predicts MEDV, the median house value. Stock predicts Open price; IMDB predicts sentiment; disease predicts plant class."
          },
          {
            title: "Prepare Features and Labels",
            detail: "Drop MEDV into X, keep MEDV as y, fill missing values with column means.",
            check: "What special data-cleaning step appears in Boston?",
            correct: "Fill missing feature values with column means",
            distractors: ["Pad reviews to length 200", "Augment images", "Create 5-day windows"],
            explain: "Boston has tabular missing values, so it fills feature NaNs. The other notebooks use text padding, image augmentation, or time windows."
          },
          {
            title: "Feature Scaling",
            detail: "Use StandardScaler with fit_transform on train and transform on test.",
            check: "Which scaler belongs to Boston?",
            correct: "StandardScaler",
            distractors: ["MinMaxScaler", "ImageDataGenerator", "pad_sequences"],
            explain: "Boston standardizes tabular features. Stock uses MinMaxScaler for prices."
          },
          {
            title: "Build Dense Regression Model",
            detail: "Stack Dense hidden layers with ReLU and a final Dense(1) output.",
            check: "Why does Boston end with Dense(1) and no activation?",
            correct: "It predicts a continuous numeric value",
            distractors: ["It predicts 38 image classes", "It predicts positive or negative sentiment", "It predicts the next word"],
            explain: "Boston is regression, so the output is one unrestricted number."
          },
          {
            title: "Train the Model",
            detail: "Fit for 100 epochs with batch size 16 and validation_split=0.2.",
            check: "Which training setup matches Boston?",
            correct: "epochs=100, batch_size=16, validation_split=0.2",
            distractors: ["epochs=10, batch_size=4", "validation_data=valid_data", "batch_size=128 for padded reviews"],
            explain: "Boston trains a small dense model longer. Stock uses tiny LSTM batches; disease uses validation_data; IMDB uses larger review batches."
          },
          {
            title: "Evaluate and Visualise",
            detail: "Compute MSE, RMSE, R2, then plot actual vs predicted prices.",
            check: "Which metric set belongs to Boston?",
            correct: "MSE, RMSE, and R2",
            distractors: ["Accuracy only", "Categorical accuracy and loss curves", "Real vs predicted stock price line"],
            explain: "Boston is regression, so MSE/RMSE/R2 are natural. Classification notebooks focus on accuracy."
          }
        ]
      },
      {
        id: "imdb",
        notebook: "2_IMDB.ipynb",
        title: "IMDB Sentiment",
        icon: "I",
        color: "#ff7ab6",
        role: "Text classification",
        dataset: "Keras IMDB dataset",
        model: "Embedding -> Flatten -> Dense -> Dropout -> Dense(1)",
        output: "Positive or negative review",
        memoryHook: "Pre-tokenised reviews, pad to 200, embedding, sigmoid sentiment.",
        steps: [
          {
            title: "Load IMDB Dataset",
            detail: "Use tensorflow.keras.datasets.imdb with num_words=10000.",
            check: "What makes the IMDB dataset different before preprocessing?",
            correct: "Reviews are already tokenised as integer word indexes",
            distractors: ["Images are stored in class folders", "Rows contain missing numeric values", "Prices must stay in time order"],
            explain: "IMDB is text, already converted to word indexes by Keras."
          },
          {
            title: "Pad Sequences",
            detail: "Use pad_sequences so every review has max_length=200.",
            check: "Why does IMDB pad sequences?",
            correct: "Reviews have different lengths but the model needs fixed input length",
            distractors: ["Images must become 128x128", "Prices must become 5-day windows", "Features must have mean 0 and std 1"],
            explain: "Text reviews vary in length, so padding makes each sample the same shape."
          },
          {
            title: "Build Embedding Model",
            detail: "Embedding maps word ids to vectors, Flatten converts them for Dense layers.",
            check: "Which layer is the signature of the IMDB notebook?",
            correct: "Embedding",
            distractors: ["Conv2D", "LSTM", "StandardScaler"],
            explain: "Embedding is the text-specific layer. CNN is for images, LSTM is for sequences, StandardScaler is preprocessing."
          },
          {
            title: "Train",
            detail: "Fit with batch_size=128 and validation_split=0.2.",
            check: "Which validation style does IMDB use?",
            correct: "validation_split=0.2",
            distractors: ["A separate valid image generator", "No validation at all", "The first 5 test days"],
            explain: "IMDB and Boston use validation_split. Disease uses a separate validation folder."
          },
          {
            title: "Evaluate",
            detail: "Evaluate test loss and accuracy.",
            check: "What is the main IMDB evaluation metric?",
            correct: "Accuracy",
            distractors: ["RMSE", "R2", "MinMax range"],
            explain: "IMDB is binary classification, so accuracy is the headline metric."
          },
          {
            title: "Predict Sample Reviews",
            detail: "Predict first test reviews; probability above 0.5 means Positive.",
            check: "What threshold turns IMDB output into a label?",
            correct: "0.5",
            distractors: ["5 days", "38 classes", "100 epochs"],
            explain: "The final sigmoid probability above 0.5 is treated as positive sentiment."
          },
          {
            title: "Plot Training Curves",
            detail: "Plot training and validation accuracy across epochs.",
            check: "What curve does IMDB focus on?",
            correct: "Training vs validation accuracy",
            distractors: ["Actual vs predicted house price", "Real vs predicted stock price", "Confusion between class folders"],
            explain: "IMDB visualizes classification learning through accuracy curves."
          }
        ]
      },
      {
        id: "disease",
        notebook: "3_disease.ipynb",
        title: "Plant Disease",
        icon: "D",
        color: "#76df9f",
        role: "Image classification",
        dataset: "Datasets/Assignment_3 folders",
        model: "Conv2D blocks -> Flatten -> Dense -> Softmax",
        output: "One of 38 plant classes",
        memoryHook: "Folder images, augmentation, CNN, categorical crossentropy, save model.",
        steps: [
          {
            title: "Define Dataset Paths",
            detail: "Set train, valid, and test image folder paths.",
            check: "How is the disease dataset organised?",
            correct: "Images inside class-named folders",

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return normalizeState({ ...defaultState, ...saved });
      } catch (error) {
        return normalizeState({ ...defaultState });
      }
    }

    function normalizeState(next) {
      missions.forEach((mission) => {
        if (!Array.isArray(next.completedSteps[mission.id])) {
          next.completedSteps[mission.id] = [];
        }
      });
      if (!next.sequencePool.length) {
        resetSequencePool(next.sequenceMission, next);
      }
      return next;
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

    }

      if (state.activeMode === "sequence") renderSequence();
      if (state.activeMode === "duel") renderDuel();
      if (state.activeMode === "params") renderParams();
      if (state.activeMode === "weak") renderWeak();

    function renderMissionCard(mission) {
      const completed = state.completedSteps[mission.id].length;

      const progress = Math.round((completed / total) * 100);
      const activeClass = state.activeMission === mission.id ? " active" : "";
      return `
        <button class="mission-card${activeClass}" data-mission="${mission.id}" style="--mission:${mission.color};--progress:${progress}%">

        </button>
      `;

    function renderMissionTimeline() {
      const mission = missionById[state.activeMission];
      const completed = state.completedSteps[mission.id];
      const currentIndex = Math.min(completed.length, mission.steps.length - 1);
      document.getElementById("missionTimeline").innerHTML = mission.steps.map((step, index) => {
        const isDone = completed.includes(index);
        const isCurrent = index === currentIndex && !isDone;
        const isLocked = index > completed.length;
        return `
          <article class="step ${isDone ? "" : "locked"} ${isCurrent ? "current" : ""}">
            <span class="step-number">${index + 1}</span>
            <div>
              <h4>${step.title}</h4>
              <p>${step.detail}</p>
            </div>
            <span class="status-dot ${isDone ? "done" : ""}">${isDone ? "OK" : isLocked ? "--" : "GO"}</span>
          </article>
        `;
      }).join("");
    }

      });

    function answerMissionStep(button, fact) {
      const mission = missionById[fact.missionId];
      const chosen = button.dataset.answer;
      const isCorrect = chosen === fact.answer;
      const buttons = document.querySelectorAll("#stepAnswers .answer");
      buttons.forEach((item) => {
        item.disabled = true;
        if (item.dataset.answer === fact.answer) item.classList.add("correct");
        if (item === button && !isCorrect) item.classList.add("wrong");
      });
      recordAnswer(fact.id, isCorrect, isCorrect ? 12 : 0);
      const feedback = document.getElementById("stepFeedback");
      feedback.className = `feedback ${isCorrect ? "good" : "bad"}`;
      feedback.textContent = fact.explanation;
      if (isCorrect) {
        const completed = state.completedSteps[mission.id];
        if (!completed.includes(fact.stepIndex)) {
          completed.push(fact.stepIndex);
        }
        if (completed.length === mission.steps.length) {
          state.completedMissions[mission.id] = true;
          state.score += 20;
        }
        saveState();
        window.setTimeout(() => {
          renderMissionTimeline();
          renderStepChallenge();
        }, 650);
      } else {
        saveState();
      }
    }

      if (isCorrect) {
        state.score += 30;
        state.streak += 1;
        feedback.className = "feedback good";
        feedback.textContent = `${mission.title} sequence mastered: ${mission.steps.map((step) => step.title).join(" -> ")}.`;
        state.sequenceSelected.forEach((stepIndex) => clearWeak(`${mission.id}-step-${stepIndex}`));
      } else {
        state.streak = 0;
        const firstWrong = state.sequenceSelected.findIndex((value, index) => value !== index);
        const expected = mission.steps[firstWrong].title;
        const placed = mission.steps[state.sequenceSelected[firstWrong]].title;
        addWeak(`${mission.id}-step-${firstWrong}`);
        feedback.className = "feedback bad";
        feedback.textContent = `First mismatch at slot ${firstWrong + 1}: expected "${expected}", but got "${placed}".`;
      }
      saveState();
    }

    function undoSequence() {
      const index = state.sequenceSelected.pop();
      if (typeof index === "number") {
        state.sequencePool.unshift(index);
        saveState();
        renderSequenceStacks();
      }
    }

    function resetSequencePool(missionId, targetState = state) {
      const mission = missionById[missionId];
      targetState.sequenceSelected = [];
      targetState.sequencePool = shuffle(mission.steps.map((_, index) => index));
    }

    function renderDuel() {
      if (!state.currentDuelId) {
        state.currentDuelId = pickDuelQuestion().id;
        saveState();
      }
      const question = allFacts.get(state.currentDuelId);
      root.innerHTML = `
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>Difference Duel</h2>
              <p>Choose the notebook that owns the clue.</p>
            </div>
            <button class="mini-button" id="nextDuel">Next Clue</button>
          </div>
          <div class="panel-body duel-card">
            <p class="prompt">${question.prompt}<small>Pick one notebook.</small></p>
            <div class="notebook-choices" id="duelChoices">
              ${missions.map((mission) => `
                <button class="choice" data-answer="${mission.id}" style="--mission:${mission.color}">
                  <strong>${mission.title}</strong>
                  <span>${mission.role}</span>
                  <span>${mission.model}</span>
                </button>
              `).join("")}
            </div>
            <div class="feedback" id="duelFeedback">Compare dataset, preprocessing, model, and output type.</div>
          </div>
        </section>
      `;
      document.getElementById("nextDuel").addEventListener("click", nextDuelQuestion);
      document.querySelectorAll("#duelChoices .choice").forEach((button) => {
        button.addEventListener("click", () => answerDuel(button, question));
      });
    }

    function pickDuelQuestion() {
      const weakDuel = duelQuestions.find((question) => state.wrongCounts[question.id] > 0);
      if (weakDuel && Math.random() < 0.55) return weakDuel;
      return duelQuestions[Math.floor(Math.random() * duelQuestions.length)];
    }

    function answerDuel(button, question) {
      const chosen = button.dataset.answer;
      const isCorrect = chosen === question.answer;
      document.querySelectorAll("#duelChoices .choice").forEach((item) => {
        item.disabled = true;
        if (item.dataset.answer === question.answer) item.classList.add("correct");
        if (item === button && !isCorrect) item.classList.add("wrong");
      });
      recordAnswer(question.id, isCorrect, isCorrect ? 10 : 0);
      const feedback = document.getElementById("duelFeedback");
      const answerMission = missionById[question.answer];
      feedback.className = `feedback ${isCorrect ? "good" : "bad"}`;
      feedback.textContent = `${question.explanation} Correct notebook: ${answerMission.title}.`;
      saveState();
    }

    function nextDuelQuestion() {
      state.currentDuelId = pickDuelQuestion().id;
      saveState();
      renderDuel();
    }

    function renderParams() {
      if (!state.currentParamId) {
        state.currentParamId = pickParamQuestion().id;
        saveState();
      }
      const question = allFacts.get(state.currentParamId);
      root.innerHTML = `
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>Model Params</h2>
              <p>Practice exact layers, activations, losses, dropout, epochs, and batch sizes.</p>
            </div>
            <button class="mini-button" id="nextParam">Next Parameter</button>
          </div>
          <div class="panel-body mode-grid">
            <aside class="side">
              <article class="challenge">
                <p class="prompt">Quick map<small>Anchor the numbers to the notebook identity.</small></p>
                <div class="weak-list">
                  ${missions.map((mission) => `
                    <div class="weak-item" style="--mission:${mission.color}">
                      <span>
                        <h3>${mission.title}</h3>
                        <p>${mission.model}</p>
                      </span>
                      <span class="mission-icon">${mission.icon}</span>
                    </div>
                  `).join("")}
                </div>
              </article>
            </aside>
            <section class="challenge">
              <p class="prompt">${question.prompt}<small>Choose the exact parameter set from the notebook.</small></p>
              <div class="answers" id="paramAnswers">
                ${shuffle([...question.choices]).map((choice) => `<button class="answer" data-answer="${escapeAttr(choice)}">${choice}</button>`).join("")}
              </div>
              <div class="feedback" id="paramFeedback">This mode drills the details that usually blur together: layer counts, activations, dropout, loss, epochs, and batch size.</div>
            </section>
          </div>
        </section>
      `;
      document.getElementById("nextParam").addEventListener("click", nextParamQuestion);
      document.querySelectorAll("#paramAnswers .answer").forEach((button) => {
        button.addEventListener("click", () => answerParam(button, question));
      });
    }

    function pickParamQuestion() {
      const weakParam = paramQuestions.find((question) => state.wrongCounts[question.id] > 0);
      if (weakParam && Math.random() < 0.6) return weakParam;
      return paramQuestions[Math.floor(Math.random() * paramQuestions.length)];
    }

    function answerParam(button, question) {
      const chosen = button.dataset.answer;
      const isCorrect = chosen === question.answer;
      document.querySelectorAll("#paramAnswers .answer").forEach((item) => {
        item.disabled = true;
        if (item.dataset.answer === question.answer) item.classList.add("correct");
        if (item === button && !isCorrect) item.classList.add("wrong");
      });
      recordAnswer(question.id, isCorrect, isCorrect ? 12 : 0);
      const feedback = document.getElementById("paramFeedback");
      feedback.className = `feedback ${isCorrect ? "good" : "bad"}`;
      feedback.textContent = question.explanation;
      saveState();
    }

    function nextParamQuestion() {
      state.currentParamId = pickParamQuestion().id;
      saveState();
      renderParams();
    }

    function renderWeak() {
      const weakFacts = Object.entries(state.wrongCounts)
        .filter(([, count]) => count > 0)
        .sort((a, b) => b[1] - a[1])
        .map(([id, count]) => ({ fact: allFacts.get(id), count }))
        .filter((item) => item.fact);

      if (!state.currentWeakId || !state.wrongCounts[state.currentWeakId]) {
        state.currentWeakId = weakFacts[0] ? weakFacts[0].fact.id : null;
        saveState();
      }

      const current = state.currentWeakId ? allFacts.get(state.currentWeakId) : null;
      root.innerHTML = `
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>Weak Review</h2>
              <p>Wrong answers stay active until you clear them.</p>
            </div>
            <button class="mini-button" id="clearWeak">Clear Weak List</button>
          </div>
          <div class="panel-body mode-grid">
            <aside class="weak-list" id="weakList">
              ${weakFacts.length ? weakFacts.map(({ fact, count }) => `
                <button class="weak-item" data-weak-id="${fact.id}">
                  <span>
                    <h3>${fact.title}</h3>
                    <p>${fact.prompt}</p>
                  </span>
                  <span class="count">${count}</span>
                </button>
              `).join("") : `<div class="empty">No weak facts yet. Miss a clue and it will appear here.</div>`}
            </aside>
            <section class="challenge" id="weakChallenge">
              ${current ? renderWeakQuestion(current) : `<div class="empty">All clear. Head to Mission Map or Difference Duel.</div>`}
            </section>
          </div>
        </section>
      `;
      document.getElementById("clearWeak").addEventListener("click", () => {
        state.wrongCounts = {};
        state.currentWeakId = null;
        saveState();
        renderWeak();
      });
      document.querySelectorAll("[data-weak-id]").forEach((button) => {
        button.addEventListener("click", () => {
          state.currentWeakId = button.dataset.weakId;
          saveState();
          renderWeak();
        });
      });
      document.querySelectorAll("#weakAnswers .answer").forEach((button) => {
        button.addEventListener("click", () => answerWeak(button, current));
      });
    }

    function renderWeakQuestion(fact) {
      if (fact.type === "duel") {
        return `
          <p class="prompt">${fact.prompt}<small>Choose the notebook.</small></p>
          <div class="answers" id="weakAnswers">
            ${missions.map((mission) => `<button class="answer" data-answer="${mission.id}">${mission.title}</button>`).join("")}
          </div>
          <div class="feedback" id="weakFeedback">${fact.explanation}</div>
        `;
      }
      return `
        <p class="prompt">${fact.prompt}<small>${fact.title}</small></p>
        <div class="answers" id="weakAnswers">
          ${shuffle([...fact.choices]).map((choice) => `<button class="answer" data-answer="${escapeAttr(choice)}">${choice}</button>`).join("")}
        </div>
        <div class="feedback" id="weakFeedback">${fact.explanation}</div>
      `;
    }

    function answerWeak(button, fact) {
      const chosen = button.dataset.answer;
      const isCorrect = chosen === fact.answer;
      document.querySelectorAll("#weakAnswers .answer").forEach((item) => {
        item.disabled = true;
        if (item.dataset.answer === fact.answer) item.classList.add("correct");
        if (item === button && !isCorrect) item.classList.add("wrong");
      });
      recordAnswer(fact.id, isCorrect, isCorrect ? 15 : 0);
      const feedback = document.getElementById("weakFeedback");
      feedback.className = `feedback ${isCorrect ? "good" : "bad"}`;
      feedback.textContent = isCorrect ? `Cleared one weak mark. ${fact.explanation}` : `Still weak. ${fact.explanation}`;
      if (isCorrect) {
        state.currentWeakId = pickNextWeakId(fact.id);
      }
      saveState();
      window.setTimeout(renderWeak, isCorrect ? 700 : 0);
    }

    function pickNextWeakId(excludeId) {
      const next = Object.entries(state.wrongCounts)
        .filter(([id, count]) => id !== excludeId && count > 0)
        .sort((a, b) => b[1] - a[1])[0];
      return next ? next[0] : null;
    }

    function recordAnswer(factId, isCorrect, points) {
      if (isCorrect) {
        state.score += points;
        state.streak += 1;
        clearWeak(factId);
      } else {
        state.streak = 0;
        addWeak(factId);
      }
    }

    function addWeak(factId) {
      state.wrongCounts[factId] = (state.wrongCounts[factId] || 0) + 1;
    }

    function clearWeak(factId) {
      if (state.wrongCounts[factId]) {
        state.wrongCounts[factId] -= 1;
        if (state.wrongCounts[factId] <= 0) delete state.wrongCounts[factId];
      }
    }

    function resetProgress() {
      const keepMode = state.activeMode;
      const keepMission = state.activeMission;
      state = normalizeState({
        ...structuredClone(defaultState),
        activeMode: keepMode,
        activeMission: keepMission
      });
      saveState();
      render();
    }

    function shuffle(items) {
      const copy = [...items];
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
      }
      return copy;
    }

    function escapeAttr(value) {
      return String(value).replace(/"/g, "&quot;");
    }

    render();
  </script>
</body>
</html>
